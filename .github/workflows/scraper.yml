name: Quarterly Ecosystem Scraper

on:
  workflow_dispatch:  # manual only - remove schedule

# Remove any 'push' or 'pull_request' triggers if present

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hour timeout for large datasets
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai supabase beautifulsoup4 requests python-dotenv

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
