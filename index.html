<!-- Floating Chatbot -->
<div id="chat-wrapper" style="position: fixed; bottom: 24px; right: 24px; z-index: 9999; font-family: Arial, sans-serif;">

  <!-- Chat Window -->
  <div id="chat-window" style="
    display: none;
    width: 500px;
    height: 560px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    margin-bottom: 12px;
  ">
    <iframe
      src="https://ecosystem-chatbot.onrender.com"
      width="100%"
      height="100%"
      frameborder="0">
    </iframe>
  </div>

  <!-- Toggle Button -->
  <div id="chat-toggle" onclick="toggleChat()" style="
    width: 60px;
    height: 60px;
    background: #0070f3;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,112,243,0.5);
    float: right;
    transition: transform 0.2s;
  " onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
    <span id="chat-icon" style="font-size: 28px;">💬</span>
  </div>
</div>

<script>
  function toggleChat() {
    const window_ = document.getElementById("chat-window");
    const icon = document.getElementById("chat-icon");
    const isOpen = window_.style.display === "block";
    window_.style.display = isOpen ? "none" : "block";
    icon.textContent = isOpen ? "💬" : "✕";
  }
</script>
