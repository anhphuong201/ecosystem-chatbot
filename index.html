<!-- Power BI Dashboard — fully responsive -->
<div style="position: relative; width: 90%; padding-bottom: 56.25%; height: 0; overflow: hidden;">
  <iframe
    title="Atlantic Innovation Ecosystem"
    src="https://app.powerbi.com/view?r=eyJrIjoiMmE3MGQwNWEtMWM0ZS00NmJlLWJjOTUtMWNhNzQ0NDVmNmRhIiwidCI6ImVkNzA1ZDM1LTdlZTktNGIyMS1hMGNlLTlkMDgzODQyNGQxZCJ9"
    frameborder="0"
    allowfullscreen="true"
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>
</div>

<!-- Floating Chatbot -->
<div id="chat-wrapper" style="position: fixed; bottom: 24px; right: 24px; z-index: 9999; font-family: 'DM Sans', Arial, sans-serif; display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">

  <!-- Chat Window -->
  <div id="chat-window" style="
    display: none;
    width: 500px;
    height: 580px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  ">
    <iframe src="https://ecosystem-chatbot.onrender.com" width="100%" height="100%" frameborder="0"></iframe>
  </div>

  <!-- Tooltip Bubble -->
  <div id="chat-tooltip" onclick="toggleChat()" style="
    background: #0a4f6e;
    color: white;
    padding: 11px 15px;
    border-radius: 14px 14px 0 14px;
    font-size: 13.5px;
    max-width: 230px;
    line-height: 1.55;
    box-shadow: 0 4px 20px rgba(10,79,110,0.35);
    cursor: pointer;
    transition: opacity 0.3s;
  ">
    <strong style="font-size: 14px;">Hi there! 👋</strong><br>
    Ask me about research & entrepreneurship resources in Atlantic Canada.
    <div style="margin-top: 5px; font-size: 11.5px; opacity: 0.7;">Click to open →</div>
  </div>

  <!-- Toggle Button -->
  <div id="chat-toggle" onclick="toggleChat()" style="
    width: 64px;
    height: 64px;
    background: #0a4f6e;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(10,79,110,0.5);
    align-self: flex-end;
    transition: transform 0.2s, background 0.2s;
    position: relative;
  "
  onmouseover="this.style.background='#10879e'; this.style.transform='scale(1.08)'"
  onmouseout="this.style.background='#0a4f6e'; this.style.transform='scale(1)'">

    <!-- Chat SVG icon -->
    <svg id="chat-icon-svg" width="28" height="28" viewBox="0 0 24 24" fill="none">
      <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
      <circle cx="8" cy="10" r="1.2" fill="#0a4f6e"/>
      <circle cx="12" cy="10" r="1.2" fill="#0a4f6e"/>
      <circle cx="16" cy="10" r="1.2" fill="#0a4f6e"/>
    </svg>

    <!-- Close icon (hidden initially) -->
    <svg id="close-icon-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" style="display:none;">
      <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>

    <!-- Green online dot -->
    <div style="
      position: absolute; top: 2px; right: 2px;
      width: 15px; height: 15px;
      background: #485BE00;
      border-radius: 50%;
      border: 2.5px solid white;
    "></div>
  </div>
</div>

<script>
  function toggleChat() {
    const win     = document.getElementById("chat-window");
    const tooltip = document.getElementById("chat-tooltip");
    const chatSvg = document.getElementById("chat-icon-svg");
    const closeSvg= document.getElementById("close-icon-svg");
    const isOpen  = win.style.display === "block";

    win.style.display      = isOpen ? "none" : "block";
    tooltip.style.display  = isOpen ? "block" : "none";
    chatSvg.style.display  = isOpen ? "block" : "none";
    closeSvg.style.display = isOpen ? "none" : "block";
  }
</script>
