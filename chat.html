<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ecosystem Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      background: white;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 95%;
      line-height: 1.6;
      font-size: 14px;
    }
    .user { background: #0070f3; color: white; align-self: flex-end; max-width: 80%; }
    .bot { background: #e9e9e9; color: #333; align-self: flex-start; }
    .result {
      background: #f8f9fa;
      border-left: 3px solid #0070f3;
      padding: 10px 12px;
      margin: 6px 0;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
    }
    .result a { color: #0070f3; text-decoration: none; }
    .result a:hover { text-decoration: underline; }
    #input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      gap: 8px;
      flex-wrap: wrap;
    }
    #province-select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    #user-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      min-width: 120px;
    }
    #send-btn {
      padding: 10px 16px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
    .typing { font-style: italic; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="messages">
      <div class="message bot">Hi! Ask me about programs, labs, and resources for research or entrepreneurship in Atlantic Canada. Select your province below.</div>
    </div>
    <div id="input-area">
      <select id="province-select">
        <option value="NS">Nova Scotia</option>
        <option value="NL">Newfoundland</option>
        <option value="PE">PEI</option>
        <option value="NB">New Brunswick</option>
        <option value="Atlantic Canada">Atlantic Canada</option>
      </select>
      <input id="user-input" type="text" placeholder="Ask a question..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://ecosystem-chatbot.onrender.com";
    const ATLANTIC_PROVINCES = ["NS", "NL", "PE", "NB"];

    let SUPABASE_URL, SUPABASE_KEY, OPENAI_API_KEY, supabaseClient;

    function expandProvince(province) {
      if (province === "Atlantic Canada") return [...ATLANTIC_PROVINCES, "Atlantic Canada"];
      if (ATLANTIC_PROVINCES.includes(province)) return [province, "Atlantic Canada"];
      return [province];
    }

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const provinceSelect = document.getElementById("province-select");

    function addMessage(html, sender) {
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      div.innerHTML = html;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function generateEmbedding(text) {
      const res = await fetch("https://api.openai.com/v1/embeddings", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${OPENAI_API_KEY}`
        },
        body: JSON.stringify({ model: "text-embedding-3-small", input: text })
      });
      const data = await res.json();
      return data.data[0].embedding;
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      btn.disabled = true;

      const typing = document.createElement("div");
      typing.className = "message bot typing";
      typing.textContent = "Thinking...";
      messagesDiv.appendChild(typing);

      try {
        const province = provinceSelect.value;
        const provinceFilter = expandProvince(province);

        // Detect intent
        const q = question.toLowerCase();
        const researchKeywords = ["research", "lab", "laboratory", "facility", "centre", "center", "institute"];
        const fundingKeywords = ["funding", "grant", "money", "investment", "capital", "finance"];
        const cleanTechKeywords = ["clean tech", "cleantech", "clean energy", "renewable", "environment"];
        const isResearch = researchKeywords.some(k => q.includes(k));
        const isFunding = fundingKeywords.some(k => q.includes(k));
        const isCleanTech = cleanTechKeywords.some(k => q.includes(k));

        const embedding = await generateEmbedding(question);

        let { data: results, error } = await supabaseClient.rpc("match_program", {
          query_embedding: embedding,
          match_count: 30
        });

        console.log("Raw results:", results ? results.length : 0, "Error:", error);

        results = (results || []).filter(r =>
          provinceFilter.includes(r.province) && (r.similarity || 0) > 0.1
        );

        // Apply intent filters
        if (isResearch) {
          const researchEcosystems = ["postsecondary research", "research", "university", "college"];
          results = results.filter(r =>
            researchEcosystems.some(e => (r.ecosystem || "").toLowerCase().includes(e)) ||
            researchKeywords.some(k => (r.program || "").toLowerCase().includes(k)) ||
            researchKeywords.some(k => (r.program_description || "").toLowerCase().includes(k))
          );
        }

        if (isCleanTech) {
          results = results.filter(r =>
            (r.industry || "").toLowerCase().includes("clean") ||
            (r.industry || "").toLowerCase().includes("energy") ||
            (r.industry || "").toLowerCase().includes("environment") ||
            (r.program_description || "").toLowerCase().includes("clean")
          );
        }

        if (isFunding) {
          results = results.filter(r =>
            (r.ecosystem || "").toLowerCase().includes("fund") ||
            (r.program || "").toLowerCase().includes("fund") ||
            (r.program || "").toLowerCase().includes("grant") ||
            (r.program_description || "").toLowerCase().includes("fund")
          );
        }

        // Fallback to organizations
        if (results.length === 0) {
          let { data: orgResults } = await supabaseClient.rpc("match_organization", {
            query_embedding: embedding,
            match_count: 30
          });
          results = (orgResults || []).filter(r =>
            provinceFilter.includes(r.province) && (r.similarity || 0) > 0.1
          );
        }

        results = results.slice(0, 10);

        if (results.length === 0) {
          messagesDiv.removeChild(typing);
          addMessage("I couldn't find any relevant programs or organizations. Try rephrasing your question.", "bot");
          btn.disabled = false;
          input.focus();
          return;
        }

        const context = results.map(r => `
Program: ${r.program || "N/A"}
Program Description: ${r.program_description || "N/A"}
Organization: ${r.organization_name || "N/A"}
Organization Description: ${r.org_description || "N/A"}
Ecosystem: ${r.ecosystem || "N/A"}
Industry: ${r.industry || "N/A"}
Province: ${r.province || "N/A"}
Program Link: ${r.program_link || "N/A"}
Org Link: ${r.org_link || "N/A"}
---`).join("\n");

        const chatRes = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENAI_API_KEY}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              {
                role: "system",
                content: `You are a helpful assistant for the Atlantic Canada innovation ecosystem.
You help researchers, entrepreneurs, startups, and students find relevant programs, labs, funding, and organizations.

IMPORTANT RULES:
- "research lab" or "lab" means physical research facilities at universities or institutions. Do NOT include incubators, accelerators, coding bootcamps, or startup programs unless specifically asked.
- "funding" or "grant" means financial programs only.
- "startup" or "entrepreneur" means incubators, accelerators, pitch competitions.
- Always match the INTENT of the question, not just keywords in the name.
- Only include results that are genuinely relevant to the question.

FORMAT your response exactly like this for each result:
<div class="result">
<strong>[Program/Lab Name]</strong><br>
🏛️ <em>[Organization Name]</em><br>
📍 [Province]<br>
📝 [One sentence description]<br>
🔗 <a href="[link]" target="_blank">Learn more</a>
</div>

- Show up to 10 results
- End with: <br><em>Would you like more details about any of these?</em>
- Province context: ${province}`
              },
              {
                role: "user",
                content: `Question: ${question}\nProvince: ${province}\n\nRelevant data:\n${context}`
              }
            ]
          })
        });

        const chatData = await chatRes.json();
        const answer = chatData.choices[0].message.content;

        messagesDiv.removeChild(typing);
        addMessage(answer, "bot");

      } catch (err) {
        messagesDiv.removeChild(typing);
        console.error("Error:", err);
        addMessage("Error: " + err.message, "bot");
      }

      btn.disabled = false;
      input.focus();
    }

    async function init() {
      let retries = 3;
      while (retries > 0) {
        try {
          const res = await fetch(`${BACKEND_URL}/config`);
          if (!res.ok) throw new Error(`Status ${res.status}`);
          const config = await res.json();
          SUPABASE_URL = config.supabase_url;
          SUPABASE_KEY = config.supabase_key;
          OPENAI_API_KEY = config.openai_key;
          supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          btn.disabled = false;
          console.log("Config loaded successfully");
          return;
        } catch (err) {
          retries--;
          console.error(`Config load failed, retries left: ${retries}`, err);
          if (retries > 0) await new Promise(r => setTimeout(r, 2000));
        }
      }
      addMessage("Failed to load configuration. Please refresh the page.", "bot");
    }

    btn.disabled = true;
    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    init();
  </script>
</body>
</html>
