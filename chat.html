<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ecosystem Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      background: white;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 80%;
      line-height: 1.4;
      font-size: 14px;
    }
    .user {
      background: #0070f3;
      color: white;
      align-self: flex-end;
    }
    .bot {
      background: #e9e9e9;
      color: #333;
      align-self: flex-start;
    }
    #input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      gap: 8px;
    }
    #province-select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    #user-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    #send-btn {
      padding: 10px 16px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
    .typing { font-style: italic; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="messages">
      <div class="message bot">Hi! Ask me about ecosystem programs in Canada. You can also select your province below.</div>
    </div>
    <div id="input-area">
      <select id="province-select">
        <option value="">All Provinces</option>
        <option value="NS">Nova Scotia</option>
        <option value="NL">Newfoundland</option>
        <option value="PE">PEI</option>
        <option value="NB">New Brunswick</option>
        <option value="Atlantic Canada">Atlantic Canada</option>
        <option value="ON">Ontario</option>
        <option value="QC">Quebec</option>
        <option value="BC">British Columbia</option>
        <option value="AB">Alberta</option>
        <option value="MB">Manitoba</option>
        <option value="SK">Saskatchewan</option>
      </select>
      <input id="user-input" type="text" placeholder="Ask a question..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const API_URL = "https://ecosystem-chatbot.onrender.com/query";

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const provinceSelect = document.getElementById("province-select");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      btn.disabled = true;

      const typing = document.createElement("div");
      typing.className = "message bot typing";
      typing.textContent = "Thinking...";
      messagesDiv.appendChild(typing);

      try {
        const body = { question };
        const province = provinceSelect.value;
        if (province) body.province = province;

        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        messagesDiv.removeChild(typing);
        addMessage(data.answer, "bot");
      } catch (err) {
        messagesDiv.removeChild(typing);
        addMessage("Sorry, something went wrong. Please try again.", "bot");
      }

      btn.disabled = false;
      input.focus();
    }

    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
