<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ecosystem Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      background: white;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 95%;
      line-height: 1.6;
      font-size: 14px;
    }
    .user { background: #0070f3; color: white; align-self: flex-end; max-width: 80%; }
    .bot { background: #e9e9e9; color: #333; align-self: flex-start; }
    .result {
      background: #f8f9fa;
      border-left: 3px solid #0070f3;
      padding: 10px 12px;
      margin: 6px 0;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
    }
    .result a { color: #0070f3; text-decoration: none; }
    .result a:hover { text-decoration: underline; }
    #input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      gap: 8px;
      flex-wrap: wrap;
    }
    #province-select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    #user-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      min-width: 120px;
    }
    #send-btn {
      padding: 10px 16px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
    .typing { font-style: italic; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="messages">
      <div class="message bot">Hi! Ask me about programs, labs, and resources for research or entrepreneurship in Atlantic Canada. Select your province below.</div>
    </div>
    <div id="input-area">
      <select id="province-select">
        <option value="Atlantic Canada">Atlantic Canada</option>
        <option value="NS">Nova Scotia</option>
        <option value="NL">Newfoundland</option>
        <option value="PE">PEI</option>
        <option value="NB">New Brunswick</option>
      </select>
      <input id="user-input" type="text" placeholder="Ask a question..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://ecosystem-chatbot.onrender.com";
    const ATLANTIC_PROVINCES = ["NS", "NL", "PE", "NB"];

    let SUPABASE_URL, SUPABASE_KEY, OPENAI_API_KEY, supabaseClient;
    let lastResults = [];

    function expandProvince(province) {
      if (province === "Atlantic Canada") return [...ATLANTIC_PROVINCES, "Atlantic Canada"];
      if (ATLANTIC_PROVINCES.includes(province)) return [province, "Atlantic Canada"];
      return [province];
    }

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const provinceSelect = document.getElementById("province-select");

    function addMessage(html, sender) {
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      div.innerHTML = html;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function generateEmbedding(text) {
      const res = await fetch("https://api.openai.com/v1/embeddings", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${OPENAI_API_KEY}`
        },
        body: JSON.stringify({ model: "text-embedding-3-small", input: text })
      });
      const data = await res.json();
      return data.data[0].embedding;
    }

    function exportToExcel() {
      if (!lastResults.length) {
        addMessage("There are no results to export yet. Please ask a question first.", "bot");
        return;
      }

      // Sort by organization name for grouping
      const sorted = [...lastResults].sort((a, b) =>
        (a.organization_name || "").localeCompare(b.organization_name || "")
      );

      const exportData = sorted.map(r => ({
        "Organization": r.organization_name || "",
        "Program": r.program || "",
        "Program Description": r.program_description || "",
        "Link": r.program_link || r.org_link || ""
      }));

      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Results");

      // Auto-width columns
      const colWidths = Object.keys(exportData[0]).map(key => ({
        wch: Math.max(key.length + 2, ...exportData.map(r => (r[key] || "").toString().length))
      }));
      ws["!cols"] = colWidths;

      const filename = `ecosystem_results_${new Date().toISOString().slice(0, 10)}.xlsx`;
      XLSX.writeFile(wb, filename);
      addMessage(`📥 Downloading <strong>${exportData.length} results</strong> grouped by organization to <em>${filename}</em>`, "bot");
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      btn.disabled = true;

      const typing = document.createElement("div");
      typing.className = "message bot typing";
      typing.textContent = "Thinking...";
      messagesDiv.appendChild(typing);

      try {
        const province = provinceSelect.value;
        const provinceFilter = expandProvince(province);

        const q = question.toLowerCase();
        const researchKeywords = ["research", "lab", "laboratory", "facility", "centre", "center", "institute"];
        const fundingKeywords = ["funding", "grant", "money", "investment", "capital", "finance", "loan", "financial support"];
        const entrepreneurKeywords = ["entrepreneur", "entrepreneurship", "start-up", "startup", "spin-off", "new business", "founder", "incubator"];
        const cleanTechKeywords = ["clean tech", "cleantech", "clean energy", "renewable", "environment"];
        const exportKeywords = ["export", "download", "excel", "spreadsheet", "list"];
          const industryKeywords = {
          "Agriculture": ["agriculture", "agri", "farm", "crop", "farming"],
          "Agrifood": ["agrifood", "food", "agri-food", "nutrition", "feed"],
          "Biotechnology": ["biotech", "biotechnology", "biology", "genomics", "bioscience"],
          "Climate & Environment": ["climate", "environment", "environmental", "sustainability", "ecological", "ecosystem"],
          "Education": ["education", "learning", "training", "academic", "teaching"],
          "Health & Wellness": ["health", "wellness", "medical", "biomedical", "clinical", "pharma", "life sciences", "healthcare"],
          "History": ["history", "historical", "heritage", "archive"],
          "Culture": ["culture", "cultural", "arts", "community"],
          "Society": ["society", "social", "community", "public", "policy"],
          "AI & Data Analytics": ["ai", "artificial intelligence", "data analytics", "machine learning", "data science", "deep learning"],
          "Ocean": ["ocean", "marine", "coastal", "underwater", "sea", "maritime", "offshore"],
          "Engineering": ["engineering", "engineer", "mechanical", "structural", "civil"],
          "Energy": ["energy", "power", "electricity", "grid", "solar", "wind"],
          "Geomatics": ["geomatics", "gis", "geospatial", "mapping", "remote sensing"],
          "ICT": ["ict", "information technology", "software", "digital", "cyber", "computing", "tech"],
          "Transportation": ["transportation", "transport", "logistics", "mobility", "autonomous vehicle"],
          "Oil & Gas": ["oil", "gas", "petroleum", "natural gas", "fossil fuel"],
          "Mining": ["mining", "mineral", "geology", "extraction", "ore"],
          "Advanced Materials & Manufacturing": ["advanced materials", "manufacturing", "materials", "composites", "fabrication", "3d printing"],
          "Nutrition": ["nutrition", "nutritional", "diet", "food science", "nutraceutical"],
          "Chemistry": ["chemistry", "chemical", "biochemistry", "molecular"],
          "Business": ["business", "commerce", "entrepreneurship", "startup", "enterprise", "sme"],
          "Geology": ["geology", "geological", "geoscience", "rock", "sediment"],
          "Aquaculture": ["aquaculture", "fish farming", "shellfish", "salmon", "seafood"],
          "Defense & Aerospace": ["defense", "defence", "aerospace", "aviation", "space", "military", "navy"],
          "Forestry": ["forestry", "forest", "wood", "lumber", "timber", "pulp"]
        };

        const isResearch = researchKeywords.some(k => q.includes(k));
        const isFunding = fundingKeywords.some(k => q.includes(k));
        const isEntrepreneur = entrepreneurKeywords.some(k => q.includes(k));
        const isCleanTech = cleanTechKeywords.some(k => q.includes(k));
        const isExport = exportKeywords.some(k => q.includes(k));
    

        if (isExport) {
          messagesDiv.removeChild(typing);
          exportToExcel();
          btn.disabled = false;
          input.focus();
          return;
        }

        const embedding = await generateEmbedding(question);

        let { data: results, error } = await supabaseClient.rpc("match_program", {
          query_embedding: embedding,
          match_count: 50
        });

        console.log("Raw results:", results ? results.length : 0, "Error:", error);

        results = (results || []).filter(r =>
          provinceFilter.includes(r.province) && (r.similarity || 0) > 0.25
        );

        results = results.sort((a, b) => (b.similarity || 0) - (a.similarity || 0));

        if (detectedIndustries.length > 0) {
          const industryFiltered = results.filter(r => {
            // industry column can have multiple values like "Ocean,Agriculture,Biotechnology"
            const industryField = (r.industry || "").toLowerCase();
            const programField = (r.program || "").toLowerCase();
            const descField = (r.program_description || "").toLowerCase();
            const clusterField = (r.research_cluster || "").toLowerCase();
        
            return detectedIndustries.some(ind => {
              // First try exact match against industry column
              const exactMatch = industryField.includes(ind.toLowerCase());
              if (exactMatch) return true;
        
              // Then try keyword match across all fields
              const keywords = industryKeywords[ind];
              return keywords.some(k =>
                industryField.includes(k) ||
                programField.includes(k) ||
                descField.includes(k) ||
                clusterField.includes(k)
              );
            });
          });
        
          if (industryFiltered.length > 0) {
            results = industryFiltered;
          }
        }

        if (isResearch) {
          const researchEcosystems = ["postsecondary research", "research", "university", "college"];
          results = results.filter(r =>
            researchEcosystems.some(e => (r.ecosystem || "").toLowerCase().includes(e)) ||
            researchKeywords.some(k => (r.program || "").toLowerCase().includes(k)) ||
            researchKeywords.some(k => (r.program_description || "").toLowerCase().includes(k))
          );
        }

        if (isEntrepreneur) {
          const entrepreneurEcosystems = ["entrepreneur", "entrepreneurship", "startup", "start-up", "spin-off", "incubator", "accelerator"];
          results = results.filter(r =>
            entrepreneurEcosystems.some(e => (r.ecosystem || "").toLowerCase().includes(e)) ||
            entrepreneurKeywords.some(k => (r.program || "").toLowerCase().includes(k)) ||
            entrepreneurKeywords.some(k => (r.program_description || "").toLowerCase().includes(k))
          );
        }

        if (isCleanTech) {
          results = results.filter(r =>
            (r.industry || "").toLowerCase().includes("clean") ||
            (r.industry || "").toLowerCase().includes("energy") ||
            (r.industry || "").toLowerCase().includes("environment") ||
            (r.program_description || "").toLowerCase().includes("clean")
          );
        }

        if (isFunding) {
          results = results.filter(r =>
            (r.ecosystem || "").toLowerCase().includes("fund") ||
            (r.program || "").toLowerCase().includes("fund") ||
            (r.program || "").toLowerCase().includes("grant") ||
            (r.program_description || "").toLowerCase().includes("fund")
          );
        }

        if (results.length === 0) {
          let { data: orgResults } = await supabaseClient.rpc("match_organization", {
            query_embedding: embedding,
            match_count: 50
          });
          results = (orgResults || []).filter(r =>
            provinceFilter.includes(r.province) && (r.similarity || 0) > 0.2
          );
          results = results.sort((a, b) => (b.similarity || 0) - (a.similarity || 0));
        }

        if (results.length === 0) {
          messagesDiv.removeChild(typing);
          addMessage("I couldn't find any relevant programs or organizations. Try rephrasing your question.", "bot");
          btn.disabled = false;
          input.focus();
          return;
        }

        // Save FULL list for export BEFORE slicing
        lastResults = results;

        // Only show top 10 in chat
        const displayResults = results.slice(0, 10);

        const context = displayResults.map(r => `
Program: ${r.program || "N/A"}
Program Description: ${r.program_description || "N/A"}
Organization: ${r.organization_name || "N/A"}
Organization Description: ${r.org_description || "N/A"}
Ecosystem: ${r.ecosystem || "N/A"}
Industry: ${r.industry || "N/A"}
Province: ${r.province || "N/A"}
Program Link: ${r.program_link || "N/A"}
Org Link: ${r.org_link || "N/A"}
---`).join("\n");

        const chatRes = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENAI_API_KEY}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              {
                role: "system",
                content: `You are a helpful assistant for the Atlantic Canada innovation ecosystem.
You help researchers, entrepreneurs, startups, and students find relevant programs, labs, funding, and organizations.

IMPORTANT RULES:
- "research lab" or "lab" means physical research facilities at universities or institutions. Do NOT include incubators, accelerators, coding bootcamps, or startup programs unless specifically asked.
- "funding" or "grant" means financial programs only.
- "startup" or "entrepreneur" or "spinoff" means incubators, accelerators, pitch competitions.
- Always match the INTENT of the question, not just keywords in the name.
- Only include results that are genuinely relevant to the question.
- If a result does not clearly relate to the user's question, do NOT include it in your response even if it appears in the data.
- Always sort results by relevance to the question, most relevant first.

FORMAT your response exactly like this for each result:
<div class="result">
<strong>[Program/Lab Name]</strong><br>
🏛️ <em>[Organization Name]</em><br>
📍 [Province]<br>
📝 [One sentence description]<br>
🔗 <a href="[link]" target="_blank">Learn more</a>
</div>

- Show up to 10 results
- End with: <br><em>Found ${results.length} results total. Type "export to excel" to download the full list.</em>
- Province context: ${province}`
              },
              {
                role: "user",
                content: `Question: ${question}\nProvince: ${province}\n\nRelevant data:\n${context}`
              }
            ]
          })
        });

        const chatData = await chatRes.json();
        const answer = chatData.choices[0].message.content;

        messagesDiv.removeChild(typing);
        addMessage(answer, "bot");

      } catch (err) {
        messagesDiv.removeChild(typing);
        console.error("Error:", err);
        addMessage("Error: " + err.message, "bot");
      }

      btn.disabled = false;
      input.focus();
    }

    async function init() {
      let retries = 3;
      while (retries > 0) {
        try {
          const res = await fetch(`${BACKEND_URL}/config`);
          if (!res.ok) throw new Error(`Status ${res.status}`);
          const config = await res.json();
          SUPABASE_URL = config.supabase_url;
          SUPABASE_KEY = config.supabase_key;
          OPENAI_API_KEY = config.openai_key;
          supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          btn.disabled = false;
          console.log("Config loaded successfully");
          return;
        } catch (err) {
          retries--;
          console.error(`Config load failed, retries left: ${retries}`, err);
          if (retries > 0) await new Promise(r => setTimeout(r, 2000));
        }
      }
      addMessage("Failed to load configuration. Please refresh the page.", "bot");
    }

    btn.disabled = true;
    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    init();
  </script>
</body>
</html>
