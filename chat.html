<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ecosystem Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      background: white;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 80%;
      line-height: 1.4;
      font-size: 14px;
    }
    .user { background: #0070f3; color: white; align-self: flex-end; }
    .bot { background: #e9e9e9; color: #333; align-self: flex-start; }
    #input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      gap: 8px;
      flex-wrap: wrap;
    }
    #province-select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    #user-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      min-width: 120px;
    }
    #send-btn {
      padding: 10px 16px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
    .typing { font-style: italic; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="messages">
      <div class="message bot">Hi! Ask me about programs, labs, and resources for research or entrepreneurship in Atlantic Canada. Select your province below.</div>
    </div>
    <div id="input-area">
      <select id="province-select">
        <option value="NS">Nova Scotia</option>
        <option value="NL">Newfoundland</option>
        <option value="PE">PEI</option>
        <option value="NB">New Brunswick</option>
        <option value="Atlantic Canada">Atlantic Canada</option>
      </select>
      <input id="user-input" type="text" placeholder="Ask a question..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://ecosystem-chatbot.onrender.com";
    const ATLANTIC_PROVINCES = ["NS", "NL", "PE", "NB"];

    let SUPABASE_URL, SUPABASE_KEY, OPENAI_API_KEY, supabaseClient;

    function expandProvince(province) {
      if (province === "Atlantic Canada") return [...ATLANTIC_PROVINCES, "Atlantic Canada"];
      if (ATLANTIC_PROVINCES.includes(province)) return [province, "Atlantic Canada"];
      return [province];
    }

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const provinceSelect = document.getElementById("province-select");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function generateEmbedding(text) {
      const res = await fetch("https://api.openai.com/v1/embeddings", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${OPENAI_API_KEY}`
        },
        body: JSON.stringify({
          model: "text-embedding-3-small",
          input: text
        })
      });
      const data = await res.json();
      return data.data[0].embedding;
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      console.log("=== sendMessage started ===");
      console.log("SUPABASE_URL:", SUPABASE_URL);
      console.log("OPENAI_API_KEY exists:", !!OPENAI_API_KEY);
      console.log("supabaseClient:", !!supabaseClient);

      addMessage(question, "user");
      input.value = "";
      btn.disabled = true;

      const typing = document.createElement("div");
      typing.className = "message bot typing";
      typing.textContent = "Thinking...";
      messagesDiv.appendChild(typing);

      try {
        const province = provinceSelect.value;
        const provinceFilter = expandProvince(province);

        console.log("Generating embedding...");
        const embedding = await generateEmbedding(question);
        console.log("Embedding generated, length:", embedding ? embedding.length : 0);

        console.log("Calling match_program...");
        let { data: results, error: programError } = await supabaseClient.rpc("match_program", {
          query_embedding: embedding,
          match_count: 20
        });

        console.log("Program error:", typeof programError !== 'undefined' ? programError : 'N/A');
        console.log("Raw results count:", results ? results.length : 0);
        console.log("First 3 results:", results ? results.slice(0,3) : []);
        console.log("Province filter:", provinceFilter);

        if (results && results.length > 0) {
          console.log("Sample similarities:", results.slice(0,5).map(r => ({
            program: r.program,
            province: r.province,
            similarity: r.similarity
          })));
        }

        // Temporarily remove ALL filters to test
        console.log("All similarities:", (results || []).map(r => ({ 
          program: r.program, 
          province: r.province, 
          similarity: r.similarity 
        })));

        results = (results || []).filter(r =>
          provinceFilter.includes(r.province) && (r.similarity || 0) > 0.1
        );

        console.log("After filter:", results);


        // Fallback to organizations
        if (results.length === 0) {
          let { data: orgResults } = await supabaseClient.rpc("match_organization", {
            query_embedding: embedding,
            match_count: 20
          });
          results = (orgResults || []).filter(r =>
            provinceFilter.includes(r.province) && (r.similarity || 0) > 0.1
          );
        }

        if (results.length === 0) {
          messagesDiv.removeChild(typing);
          addMessage("I couldn't find any relevant programs or organizations. Try rephrasing your question.", "bot");
          btn.disabled = false;
          input.focus();
          return;
        }

        // Build context
        const context = results.map(r => `
Program: ${r.program || "N/A"}
Description: ${r.program_description || r.org_description || "N/A"}
Organization: ${r.organization_name || "N/A"}
Province: ${r.province || "N/A"}
Link: ${r.program_link || r.org_link || "N/A"}
---`).join("\n");

        // Ask GPT
        const chatRes = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENAI_API_KEY}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              {
                role: "system",
                content: "You are a helpful ecosystem assistant for Atlantic Canada innovation programs and organizations. Be specific, reference program names, include links, and keep answers concise and friendly."
              },
              {
                role: "user",
                content: `Question: ${question}\nProvince: ${province}\n\nRelevant data:\n${context}`
              }
            ]
          })
        });

        const chatData = await chatRes.json();
        const answer = chatData.choices[0].message.content;

        messagesDiv.removeChild(typing);
        addMessage(answer, "bot");

      } catch (err) {
        messagesDiv.removeChild(typing);
        console.error(err);
        addMessage("Error: " + err.message, "bot");
      }

      btn.disabled = false;
      input.focus();
    }

    // Load config from backend first, then enable chat
    async function init() {
      try {
        const res = await fetch(`${BACKEND_URL}/config`);
        const config = await res.json();
        SUPABASE_URL = config.supabase_url;
        SUPABASE_KEY = config.supabase_key;
        OPENAI_API_KEY = config.openai_key;
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        btn.disabled = false;
      } catch (err) {
        addMessage("Failed to load configuration. Please refresh the page.", "bot");
        console.error(err);
      }
    }

    // Disable button until config is loaded
    btn.disabled = true;
    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    init();
  </script>
</body>
</html>
